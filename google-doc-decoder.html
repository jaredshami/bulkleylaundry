<!DOCTYPE html>
<html>
<head>
    <title>Google Doc Grid Decoder</title>
</head>
<body>
    <p>Open DevTools Console (F12) to see the decoded grid.</p>
    
    <script>
        async function decodeGoogleDoc(url) {
            try {
                // Use CORS proxy to fetch the document
                const corsUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const response = await fetch(corsUrl);
                const html = await response.text();
                
                // Extract text content from HTML
                // Remove script tags
                let content = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
                // Remove style tags
                content = content.replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '');
                // Remove HTML tags
                content = content.replace(/<[^>]+>/g, ' ');
                // Decode HTML entities
                const textarea = document.createElement('textarea');
                textarea.innerHTML = content;
                content = textarea.value;
                
                console.log('Extracted text length:', content.length);
                console.log('First 2000 characters:');
                console.log(content.substring(0, 2000));
                
                // Parse the grid data
                const grid = {};
                let maxX = 0;
                let maxY = 0;
                
                // The data might be all on one line with multiple spaces, so we need to handle that
                // Look for pattern: number + spaces + character + spaces + number
                // Using regex to find all occurrences of: digit+ non-digit digit+
                const regex = /(\d+)\s+(.)\s+(\d+)/g;
                let match;
                let parseCount = 0;
                
                while ((match = regex.exec(content)) !== null) {
                    const x = parseInt(match[1]);
                    const char = match[2];
                    const y = parseInt(match[3]);
                    
                    console.log(`Parsed: x=${x}, char="${char}", y=${y}`);
                    parseCount++;
                    
                    // Store in grid
                    grid[`${x},${y}`] = char;
                    
                    // Track max coordinates
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }
                
                console.log('Total parsed:', parseCount);
                
                // Print the grid
                console.log('\n=== SECRET MESSAGE ===\n');
                for (let y = maxY; y >= 0; y--) {
                    let row = '';
                    for (let x = 0; x <= maxX; x++) {
                        row += grid[`${x},${y}`] || ' ';
                    }
                    console.log(row);
                }
                console.log('\n');
                
            } catch (error) {
                console.error('Error decoding Google Doc:', error);
            }
        }
        
        // Test with the user's document
        decodeGoogleDoc('https://docs.google.com/document/d/e/2PACX-1vSvM5gDlNvt7npYHhp_XfsJvuntUhq184By5xO_pA4b_gCWeXb6dM6ZxwN8rE6S4ghUsCj2VKR21oEP/pub');
    </script>
</body>
</html>
